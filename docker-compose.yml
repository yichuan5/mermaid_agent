services:
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
